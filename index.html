<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" data-accent="jade">
    <head>
        <!-- Headers -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>The Beauty of Dhofar</title>

        <!-- Styles -->
        <link rel="stylesheet" href="./css/general.css">
        <link rel="stylesheet" href="./css/general-english.css">
        <link rel="stylesheet" href="./css/index/carousel.css">
        <link rel="stylesheet" href="./css/index/video-sections.css">

        <!-- Google Fonts - Pacifico -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- Vue.js 3 CDN -->
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/typeit@8.7.1/dist/index.umd.min.js"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
    </head>
    <body>
        <div id="app">
            <!-- Sidebar Drawer -->
            <sidebar></sidebar>

            <!-- SVG Sprite -->
            <svg class="hidden">
                <use href="./images/svg/sprite.svg#icon-hamburger"></use>
                <use href="./images/svg/sprite.svg#icon-close"></use>
                <use href="./images/svg/sprite.svg#icon-more-vertical"></use>
            </svg>

            <!-- Navigation Bar -->
            <navbar></navbar>

            <!-- Header -->
            <header>
                <!-- Carousel -->
                <carousel></carousel>
            </header>

            <main>
                <view-section></view-section>
            </main>
        </div>

        <!-- Data -->
        <script src="./js/vue/data.js"></script>

        <!-- Components -->
        <script src="./js/vue/components/Sidebar.js"></script>
        <script src="./js/vue/components/Navbar.js"></script>
        <script src="./js/vue/components/Carousel.js"></script>
        <script src="./js/vue/components/Section.js"></script>

        <!-- Vue App -->
        <script>
            const { createApp } = Vue;

            const app = createApp({
                data() {
                    return {
                        language: 'en',
                        theme: 'light',
                        accent: 'jade'
                    };
                },
                mounted() {
                    this.loadPreferences();
                },
                methods: {
                    loadPreferences() {
                        const savedTheme = localStorage.getItem('theme');
                        const savedLanguage = localStorage.getItem('language');
                        
                        if (savedTheme) this.theme = savedTheme;
                        if (savedLanguage) this.language = savedLanguage;
                        
                        this.applyPreferences();
                    },
                    applyPreferences() {
                        document.documentElement.setAttribute('data-theme', this.theme);
                        document.documentElement.setAttribute('data-accent', this.accent);
                        if (this.language === 'ar') {
                            document.documentElement.setAttribute('dir', 'rtl');
                        } else {
                            document.documentElement.setAttribute('dir', 'ltr');
                        }
                    },
                    setTheme(theme) {
                        this.theme = theme;
                        localStorage.setItem('theme', theme);
                        this.applyPreferences();
                    },
                    setLanguage(lang) {
                        this.language = lang;
                        localStorage.setItem('language', lang);
                        this.applyPreferences();
                    }
                }
            });

            // Register components
            app.component('navbar', Navbar);
            app.component('sidebar', Sidebar);
            app.component('carousel', Carousel);
            app.component('view-section', ViewSection);

            // Mount app
            app.mount('#app');
        </script>
    </body>
</html>
